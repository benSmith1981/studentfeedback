<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Excel Feedback Generator</title>
  <style>
    body { font-family: Arial; max-width: 700px; margin: 40px auto; }
    label { display: block; margin-top: 15px; font-weight: bold; }
    input, button { width: 100%; padding: 10px; margin-top: 10px; }
  </style>
</head>
<body>

<h2>Generate Feedback from Excel</h2>

<p>
Upload the completed Excel template.  
One row per learner, criteria on the second sheet.
</p>

<p>
<a href="/download-template" target="_blank">
⬇️ Download Excel Template
</a>
</p>

<form method="POST" action="/feedback" enctype="multipart/form-data">
  <label>Select Excel file</label>
  <input type="file" name="file" accept=".xlsx" required>
  <button type="submit">Generate ZIP of Word Docs</button>
</form>

<p><a href="/">⬅ Back to home</a></p>

</body>
</html>
